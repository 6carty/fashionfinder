{{ filteredPosts?.length }} "123456"

<ng-container *ngFor="let post of filteredPosts; let i = index; trackBy: trackId" class="post-container">
  <div class="my-feed">
    <div class="heading">
      <div class="user">
        <div class="profile-photo">
          <img
            src="/content/images/jhipster_family_member_2_head-192.png"
            alt="Profile Picture"
            class="image"
            [routerLink]="['/user-profile/']"
          />
        </div>
        <div class="post-user-info">
          <div class="username-text">
            <h5>
              <b>{{ getPostUsername(post) }} username should be here </b>
            </h5>
          </div>
          <div class="post-info-text">
            <small>{{ getPostLocation(post) }}, {{ post.createdDate }}</small>
          </div>
        </div>
      </div>
      <div class="post-options">
        <!--- include ellipses image, this is where you can report a post-->
        <img src="/content/images/ellipses.png" class="post-options-img" alt="Options Image" />
      </div>
    </div>

    <div class="post">
      <img src="{{ post.image }}" class="post-img" alt="Post Picture" />
    </div>

    <div class="action-buttons">
      <div class="interaction-buttons">
        <span><i class="/g"></i></span>
        <button class="like-btn" [routerLink]="['/likes/new']">
          <!-- onclick="changeImage()" -->
          <img id="like-img" src="/content/images/unliked.png" class="action-img" alt="Like Icon" />
        </button>
        <button class="comment-btn" [routerLink]="['/comment/new']">
          <img src="/content/images/comment.png" class="action-img" alt="Comment Icon" />
        </button>
        <button class="share-btn" [routerLink]="['/share/new']">
          <img src="/content/images/share.png" class="action-img" alt="Share Icon" />
        </button>
      </div>
    </div>

    <div class="liked-by">
      <p><b>123 others</b></p>
    </div>
    <div class="caption">
      <p><b>USERNAME</b> INSERT CAPTION HERE</p>
    </div>
    <div class="text-muted" [routerLink]="['/comment/new']">View all 20 comments</div>
  </div>
</ng-container>
