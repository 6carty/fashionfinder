<ng-container *ngFor="let post of feedPosts; let i = index; trackBy: trackId" class="post-container">
  <div class="my-feed">
    <div class="heading">
      <div *ngFor="let currentAuthor of feedUsernames[i]" class="user">
        <div class="profile-photo">
          <img
            [src]="'data:' + currentAuthor.imageType + ';base64,' + currentAuthor.imageURL"
            alt="Profile Picture"
            class="image"
            [routerLink]="['/user-profile/']"
          />
        </div>
        <div class="post-user-info">
          <div class="username-text">
            <h5>{{ currentAuthor.username }}</h5>
          </div>
          <div class="post-info-text">
            <small> {{ post.createdDate }}</small>
          </div>
        </div>
      </div>
    </div>

    <div class="post">
      <img [src]="'data:' + post.imageContentType + ';base64,' + post.image" class="post-img" alt="Post Picture" />
    </div>
    <div class="action-buttons">
      <div class="interaction-buttons">
        <span><i class="/g"></i></span>
        <button class="like-btn" [routerLink]="['/likes/new']">
          <!-- onclick="changeImage()" -->

          <img id="like-img" src="/content/images/unliked.png" class="action-img" alt="Like Icon" />
        </button>
        <button class="comment-btn" [routerLink]="['/comment/new']">
          <img src="/content/images/comment.png" class="action-img" alt="Comment Icon" />
        </button>
      </div>
    </div>
    <ng-container *ngFor="let like of likeDetails[i]">
      <div class="liked-by" [routerLink]="['/likes/']">
        <h6>{{ like.likeCount }} Likes</h6>
      </div>
    </ng-container>

    <ng-container *ngFor="let currentPost of everyPostsInfo[i]" class="postAuthorInfo">
      <ng-container *ngFor="let currentAuthor of feedUsernames[i]" class="caption">
        <h5>
          <b>{{ currentAuthor.username }}</b> {{ post.caption }}
        </h5>
      </ng-container>
      <div class="comments">
        <h6>
          <u>{{ currentPost.commentFrom }}</u> {{ currentPost.visibleComment }}
        </h6>
        <div class="text-muted" [routerLink]="['/comment/']">View Comments</div>
      </div>
    </ng-container>
  </div>
</ng-container>
