<div class="row">
  <link href="https://fonts.googleapis.com/css?family=Inter" rel="stylesheet" />

  <div class="col-md-9">
    <h1 class="display-4">
      <span class="logo-img"></span>
      <h1 class="first-line">Join and curate</h1>
      <h1 class="second-line">your every wardrobe needs</h1>
    </h1>
    <button class="get-started-button" (click)="signUP()">Get Started</button>

    <div [ngSwitch]="account !== null">
      <div class="alert alert-success fade-out" *ngSwitchCase="true">
        <span id="home-logged-message" *ngIf="account">You are logged in as user "{{ account.login }}".</span>
      </div>
    </div>
  </div>
</div>
