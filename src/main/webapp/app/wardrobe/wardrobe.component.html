<div class="display-wardrobe">
  <div class="grid-container-large">
    <div class="rectangle-filter">
      <div class="rectangle-displayContent">
        <div class="grid-container">
          <div class="dropdown-new-item">
            <span><h5>add new item</h5></span>
            <div class="dropdown-new-item-content">
              <h5>NAME</h5>
              <input type="text" id="clothingItemNameField" />
              <h5>TYPE</h5>
              <select id="clothingItemTypeField">
                <option>shirt</option>
                <option>trousers</option>
                <option>dress</option>
                <option>hats</option>
                <option>footwear</option>
                <option>accessories</option>
                <option>others</option>
              </select>
              <h5>OCCASION</h5>
              <select id="clothingItemOccasionField">
                <option>casual</option>
                <option>formal</option>
                <option>party</option>
                <option>smart casual</option>
              </select>
              <h5>DESCRIPTION</h5>
              <input type="text" id="clothingItemDescriptionField" />
              <h5>SIZE</h5>
              <select id="clothingItemSizeField">
                <option>XXS</option>
                <option>XS</option>
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
                <option>XXL</option>
                <option>other</option>
              </select>
              <h5>BRAND</h5>
              <input type="text" id="clothingItemBrandField" />
              <h5>material</h5>
              <input type="text" id="clothingItemMaterialField" />
              <br /><br />
              <div class="apply-filter-button" (click)="onCreateItemButtonClick()"><h5>create new clothing item</h5></div>
            </div>
          </div>

          <br />
          <div class="apply-filter-button"><h5>apply filters</h5></div>
        </div>
      </div>
    </div>

    <div class="rectangle-display">
      <div class="rectangle-displayContent">
        <h1>Your Clothes</h1>

        <div class="grid-container" *ngFor="let item of clothingReceivedData; let i = index">
          <div class="clothing-item-box">
            <input type="checkbox" id="{{ item.id }}" ngModel="selectedItems[i].isChecked" />
            <label for="{{ item.id }}">{{ item.name?.toString() }}</label>
          </div>
        </div>
      </div>
    </div>

    <div class="rectangle-filter">
      <div class="rectangle-displayContent">
        <h1>Your Outfits</h1>
        <div class="dropdown-new-item">
          <h5>create new outfit</h5>
          <div class="dropdown-new-item-content-outfit">
            <h5>NAME</h5>
            <input type="text" id="OutfitNameField" />
            <h5>OCCASION</h5>
            <select id="OutfitOccasionField">
              <option>formal</option>
              <option>business</option>
              <option>casual</option>
              <option>sports</option>
            </select>
            <br /><br />
            <div class="apply-filter-button" (click)="onCreateOutfitButtonClick()"><h5>create new outfit</h5></div>
          </div>
        </div>
        <br /><br />

        <div class="grid-container" *ngFor="let item of outfitReceivedData">
          <div class="outfit-box">
            <input type="checkbox" id="{{ item.id }}" />
            <label for="{{ item.id }}">{{ item.name?.toString() }}</label>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
