<div class="display-wardrobe">
  <div class="grid-container-large">
    <div class="display-box rectangle-filter">
      <div class="rectangle-displayContent">
        <div class="grid-container">
          <button class="button-main dropdown-new-item" (click)="onCreateItemButtonClick()">
            <span><h5 style="color: var(--button-text-color)">add new item</h5></span>
          </button>
          <br />
          <button class="button-main dropdown-new-item" (click)="onCreateOutfitButtonClick()">
            <span><h5 style="color: var(--button-text-color)">add new outfit</h5></span>
          </button>
          <br />
          <button class="button-main apply-filter-button" (click)="filterButtonPressed()">
            <h5 style="color: var(--button-text-color)">apply filters</h5>
          </button>
          <div class="grid-container-2">
            <button class="filter-tick" (click)="filterSortAlphabetical = !filterSortAlphabetical">
              <b *ngIf="filterSortAlphabetical">✓</b>
              <b *ngIf="!filterSortAlphabetical">X</b>
            </button>
            <h5>SORT ALPHABETICALLY</h5>
          </div>
          <div class="grid-container-2">
            <button class="filter-tick" (click)="filterSortType = !filterSortType">
              <b *ngIf="filterSortType">✓</b>
              <b *ngIf="!filterSortType">X</b>
            </button>
            <h5>SORT BY TYPE</h5>
          </div>
          <select id="clothingItemTypeFilter">
            <option>SHIRTS</option>
            <option>SHOES</option>
            <option>DRESS</option>
            <option>TROUSERS</option>
            <option>HATS</option>
            <option>ACCESSORIES</option>
            <option>OTHERS</option>
          </select>
        </div>
      </div>
    </div>

    <div class="display-box rectangle-display">
      <div class="rectangle-displayContent">
        <h1>Your Clothes</h1>
        <div class="scrollable-area">
          <div class="grid-container" *ngFor="let item of filteredItems; let i = index; trackBy: trackByClothingId">
            <div class="clothing-item-box">
              <button class="clothing-box" (click)="onClothingItemClicked(item.id)">
                <img src="data:image/{{ item.imageContentType }};charset=utf-8;base64,{{ item.image }}" alt="{{ item.name }}" />
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="display-box rectangle-filter">
      <div class="rectangle-displayContent">
        <h1>Your Outfits</h1>
        <br /><br />
        <div class="scrollable-area">
          <div class="grid-container" *ngFor="let item of outfitReceivedData">
            <button class="outfit-box" (click)="onOutfitClicked(item.id)">
              <img src="data:image/{{ item.imageContentType }};charset=utf-8;base64,{{ item.image }}" alt="{{ item.name }}" />
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
