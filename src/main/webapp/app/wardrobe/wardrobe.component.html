<p>wardrobe works!</p>
<div class="display-wardrobe">
  <div class="rectangle-filter">
    <div class="rectangle-displayContent">
      <form (ngSubmit)="onSubmit()">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" [(ngModel)]="formData.name" />
        <br />
        <label for="occasion">Occasion:</label>
        <input type="text" id="occasion" name="occasion" [(ngModel)]="formData.occasion" />
        <br />
        <label for="colour">Colour:</label>
        <input type="text" id="colour" name="colour" [(ngModel)]="formData.colour" />
        <br />
        <button type="submit">Submit</button>
      </form>
    </div>
  </div>
  <div class="rectangle-display">
    <div class="rectangle-displayContent">
      <table class="table-clothes">
        <caption>
          Clothing items
        </caption>
        <thead>
          <th>Name</th>
          <th>Occasion</th>
          <th>Colour</th>
        </thead>
        <tfoot>
          <tr>
            <td colspan="3">Currently a test</td>
          </tr>
        </tfoot>
        <tbody *ngFor="let item of recievedData">
          <tr *ngIf="item.owner.id == 1001">
            <th>{{ item.name }}</th>
            <td>{{ item.style }}</td>
            <td>{{ item.colour }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
