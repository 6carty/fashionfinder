<!-- sidebar.component.html -->

<div class="sidebar">
  <!-- Profile Picture -->
  <div class="profile-picture">
    <img src="assets/profile-picture.jpg" alt="Profile Picture" />
  </div>

  <!-- Display Name -->
  <div class="display-name">
    <span class="label">@USERNAME</span>
  </div>

  <!-- Followers and Following Section -->
  <div class="stats">
    <div class="ranking">
      <span class="text">
        <h6>Rank:</h6>
        <h5>24</h5>
      </span>
    </div>

    <div class="followers">
      <span class="text">
        <h6>Followers:</h6>
        <h5>500</h5>
      </span>
    </div>

    <div class="following">
      <span class="text">
        <h6>Following:</h6>
        <h5>1000</h5>
      </span>
    </div>

    <div class="like-count">
      <span class="text">
        <h6>Total Likes:</h6>
        <h5>2423</h5>
      </span>
    </div>
  </div>

  <!-- Button for Uploads -->
  <button class="btn">Uploads</button>

  <!-- Button for Gallery -->
  <button class="btn">Gallery</button>
</div>
