<!-- sidebar.component.html -->
<div class="user-details">
  <!-- Profile Picture -->
  <div class="profile-picture">
    <img src="content/images/jhipster_family_member_0_head-192.png" alt="Profile Picture" class="circle-image" />
  </div>
  <!-- Display Name -->
  <div class="display-name">
    <h5>Haydon Carty</h5>
    <p class="text-muted">@sixcarty</p>
  </div>

  <div class="sidebar">
    <div class="stats">
      <a class="rank" style="text-decoration: none">
        <span class="stat-heading"
          ><h5><b>Rank:</b></h5></span
        >
        <span class="stat-value"><h4>0</h4></span>
      </a>
      <a class="followers" style="text-decoration: none">
        <span class="stat-heading"
          ><h5><b>Followers:</b></h5></span
        >
        <span class="stat-value"><h4>0</h4></span>
      </a>
      <a class="following" style="text-decoration: none">
        <span class="stat-heading"
          ><h5><b>Following:</b></h5></span
        >
        <span class="stat-value"><h4>0</h4></span>
      </a>
      <a class="like-count" style="text-decoration: none">
        <span class="stat-heading"
          ><h5><b>Total Likes:</b></h5></span
        >
        <span class="stat-value"><h4>0</h4></span>
      </a>
    </div>
    <!-- Button for Uploads -->
    <button class="post-btn"><b>Create Post</b></button>
    <!-- Button for Gallery -->
    <button class="gallery-btn"><b>Gallery</b></button>
  </div>
</div>
