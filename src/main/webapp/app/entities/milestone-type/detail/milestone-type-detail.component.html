<div class="d-flex justify-content-center">
  <div class="col-8">
    <div *ngIf="milestoneType">
      <h2 data-cy="milestoneTypeDetailsHeading"><span>Milestone Type</span></h2>

      <hr />

      <jhi-alert-error></jhi-alert-error>

      <jhi-alert></jhi-alert>

      <dl class="row-md jh-entity-details">
        <dt><span>ID</span></dt>
        <dd>
          <span>{{ milestoneType.id }}</span>
        </dd>
        <dt><span>Name</span></dt>
        <dd>
          <span>{{ milestoneType.name }}</span>
        </dd>
        <dt><span>Initial Target</span></dt>
        <dd>
          <span>{{ milestoneType.initialTarget }}</span>
        </dd>
        <dt><span>Next Target</span></dt>
        <dd>
          <span>{{ milestoneType.nextTarget }}</span>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
      </button>

      <button type="button" [routerLink]="['/milestone-type', milestoneType.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
      </button>
    </div>
  </div>
</div>
