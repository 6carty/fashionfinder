<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 id="jhi-user-milestone-heading" data-cy="UserMilestoneCreateUpdateHeading">Create or edit a User Milestone</h2>

      <div>
        <jhi-alert-error></jhi-alert-error>

        <div class="row mb-3" *ngIf="editForm.controls.id.value !== null">
          <label class="form-label" for="field_id">ID</label>
          <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
        </div>

        <div class="row mb-3">
          <label class="form-label" for="field_currentProgress">Current Progress</label>
          <input
            type="number"
            class="form-control"
            name="currentProgress"
            id="field_currentProgress"
            data-cy="currentProgress"
            formControlName="currentProgress"
          />
          <div
            *ngIf="
              editForm.get('currentProgress')!.invalid &&
              (editForm.get('currentProgress')!.dirty || editForm.get('currentProgress')!.touched)
            "
          >
            <small class="form-text text-danger" *ngIf="editForm.get('currentProgress')?.errors?.required"> This field is required. </small>
            <small class="form-text text-danger" [hidden]="!editForm.get('currentProgress')?.errors?.number">
              This field should be a number.
            </small>
          </div>
        </div>

        <div class="row mb-3">
          <label class="form-label" for="field_completed">Completed</label>
          <input type="checkbox" class="form-check" name="completed" id="field_completed" data-cy="completed" formControlName="completed" />
          <div *ngIf="editForm.get('completed')!.invalid && (editForm.get('completed')!.dirty || editForm.get('completed')!.touched)">
            <small class="form-text text-danger" *ngIf="editForm.get('completed')?.errors?.required"> This field is required. </small>
          </div>
        </div>

        <div class="row mb-3">
          <label class="form-label" for="field_unlockedDate">Unlocked Date</label>
          <div class="d-flex">
            <input
              id="field_unlockedDate"
              data-cy="unlockedDate"
              type="datetime-local"
              class="form-control"
              name="unlockedDate"
              formControlName="unlockedDate"
              placeholder="YYYY-MM-DD HH:mm"
            />
          </div>
        </div>

        <div class="row mb-3">
          <label class="form-label" for="field_milestoneType">Milestone Type</label>
          <select
            class="form-control"
            id="field_milestoneType"
            data-cy="milestoneType"
            name="milestoneType"
            formControlName="milestoneType"
            [compareWith]="compareMilestoneType"
          >
            <option [ngValue]="null"></option>
            <option [ngValue]="milestoneTypeOption" *ngFor="let milestoneTypeOption of milestoneTypesSharedCollection">
              {{ milestoneTypeOption.id }}
            </option>
          </select>
        </div>

        <div class="row mb-3">
          <label class="form-label" for="field_userProfile">User Profile</label>
          <select
            class="form-control"
            id="field_userProfile"
            data-cy="userProfile"
            name="userProfile"
            formControlName="userProfile"
            [compareWith]="compareUserProfile"
          >
            <option [ngValue]="null"></option>
            <option [ngValue]="userProfileOption" *ngFor="let userProfileOption of userProfilesSharedCollection">
              {{ userProfileOption.id }}
            </option>
          </select>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span>Cancel</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span>Save</span>
        </button>
      </div>
    </form>
  </div>
</div>
