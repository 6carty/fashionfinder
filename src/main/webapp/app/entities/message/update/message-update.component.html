<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 id="jhi-message-heading" data-cy="MessageCreateUpdateHeading">Create or edit a Message</h2>

      <div>
        <jhi-alert-error></jhi-alert-error>

        <div class="row mb-3" *ngIf="editForm.controls.id.value !== null">
          <label class="form-label" for="field_id">ID</label>
          <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
        </div>

        <div class="row mb-3">
          <label class="form-label" for="field_content">Content</label>
          <input type="text" class="form-control" name="content" id="field_content" data-cy="content" formControlName="content" />
          <div *ngIf="editForm.get('content')!.invalid && (editForm.get('content')!.dirty || editForm.get('content')!.touched)">
            <small class="form-text text-danger" *ngIf="editForm.get('content')?.errors?.required"> This field is required. </small>
          </div>
        </div>

        <div class="row mb-3">
          <label class="form-label" for="field_timeStamp">Time Stamp</label>
          <div class="d-flex">
            <input
              id="field_timeStamp"
              data-cy="timeStamp"
              type="datetime-local"
              class="form-control"
              name="timeStamp"
              formControlName="timeStamp"
              placeholder="YYYY-MM-DD HH:mm"
            />
          </div>
          <div *ngIf="editForm.get('timeStamp')!.invalid && (editForm.get('timeStamp')!.dirty || editForm.get('timeStamp')!.touched)">
            <small class="form-text text-danger" *ngIf="editForm.get('timeStamp')?.errors?.required"> This field is required. </small>
            <small class="form-text text-danger" [hidden]="!editForm.get('timeStamp')?.errors?.datetimelocal">
              This field should be a date and time.
            </small>
          </div>
        </div>

        <div class="row mb-3">
          <label class="form-label" for="field_messageImage">Message Image</label>
          <div>
            <img
              [src]="'data:' + editForm.get('messageImageContentType')!.value + ';base64,' + editForm.get('messageImage')!.value"
              style="max-height: 100px"
              *ngIf="editForm.get('messageImage')!.value"
              alt="message image"
            />
            <div *ngIf="editForm.get('messageImage')!.value" class="form-text text-danger clearfix">
              <span class="pull-start"
                >{{ editForm.get('messageImageContentType')!.value }}, {{ byteSize(editForm.get('messageImage')!.value!) }}</span
              >
              <button
                type="button"
                (click)="clearInputImage('messageImage', 'messageImageContentType', 'file_messageImage')"
                class="btn btn-secondary btn-xs pull-end"
              >
                <fa-icon icon="times"></fa-icon>
              </button>
            </div>
            <input
              type="file"
              id="file_messageImage"
              data-cy="messageImage"
              (change)="setFileData($event, 'messageImage', true)"
              accept="image/*"
            />
          </div>
          <input
            type="hidden"
            class="form-control"
            name="messageImage"
            id="field_messageImage"
            data-cy="messageImage"
            formControlName="messageImage"
          />
          <input
            type="hidden"
            class="form-control"
            name="messageImageContentType"
            id="field_messageImageContentType"
            formControlName="messageImageContentType"
          />
        </div>

        <div class="row mb-3">
          <label class="form-label" for="field_chatroom">Chatroom</label>
          <select
            class="form-control"
            id="field_chatroom"
            data-cy="chatroom"
            name="chatroom"
            formControlName="chatroom"
            [compareWith]="compareChatroom"
          >
            <option [ngValue]="null"></option>
            <option [ngValue]="chatroomOption" *ngFor="let chatroomOption of chatroomsSharedCollection">{{ chatroomOption.id }}</option>
          </select>
        </div>

        <div class="row mb-3">
          <label class="form-label" for="field_userProfile">User Profile</label>
          <select
            class="form-control"
            id="field_userProfile"
            data-cy="userProfile"
            name="userProfile"
            formControlName="userProfile"
            [compareWith]="compareUserProfile"
          >
            <option [ngValue]="null"></option>
            <option [ngValue]="userProfileOption" *ngFor="let userProfileOption of userProfilesSharedCollection">
              {{ userProfileOption.id }}
            </option>
          </select>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span>Cancel</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span>Save</span>
        </button>
      </div>
    </form>
  </div>
</div>
