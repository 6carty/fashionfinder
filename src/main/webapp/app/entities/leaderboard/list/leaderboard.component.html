<div>
  <h2 id="page-heading" data-cy="LeaderboardHeading">
    <span>Leaderboards</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="load()" [disabled]="isLoading">
        <fa-icon icon="sync" [spin]="isLoading"></fa-icon>
        <span>Refresh list</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-leaderboard"
        [routerLink]="['/leaderboard/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span> Create a new Leaderboard </span>
      </button>
    </div>
  </h2>

  <jhi-alert-error></jhi-alert-error>

  <jhi-alert></jhi-alert>

  <div class="alert alert-warning" id="no-result" *ngIf="leaderboards?.length === 0">
    <span>No Leaderboards found</span>
  </div>

  <div class="table-responsive table-entities" id="entities" *ngIf="leaderboards && leaderboards.length > 0">
    <table class="table table-striped" aria-describedby="page-heading">
      <thead>
        <tr jhiSort [(predicate)]="predicate" [(ascending)]="ascending" (sortChange)="navigateToWithComponentValues()">
          <th scope="col" jhiSortBy="id">
            <div class="d-flex">
              <span>ID</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="profilePic">
            <div class="d-flex">
              <span>Profile Pic</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="usersName">
            <div class="d-flex">
              <span>Users Name</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="likeCount">
            <div class="d-flex">
              <span>Like Count</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="position">
            <div class="d-flex">
              <span>Position</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="post.id">
            <div class="d-flex">
              <span>Post</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let leaderboard of leaderboards; trackBy: trackId" data-cy="entityTable">
          <td>
            <a [routerLink]="['/leaderboard', leaderboard.id, 'view']">{{ leaderboard.id }}</a>
          </td>
          <td>
            <a *ngIf="leaderboard.profilePic" (click)="openFile(leaderboard.profilePic, leaderboard.profilePicContentType)">
              <img
                [src]="'data:' + leaderboard.profilePicContentType + ';base64,' + leaderboard.profilePic"
                style="max-height: 30px"
                alt="leaderboard image"
              />
            </a>
            <span *ngIf="leaderboard.profilePic">{{ leaderboard.profilePicContentType }}, {{ byteSize(leaderboard.profilePic) }}</span>
          </td>
          <td>{{ leaderboard.usersName }}</td>
          <td>{{ leaderboard.likeCount }}</td>
          <td>{{ leaderboard.position }}</td>
          <td>
            <div *ngIf="leaderboard.post">
              <a [routerLink]="['/post', leaderboard.post.id, 'view']">{{ leaderboard.post.id }}</a>
            </div>
          </td>
          <td class="text-end">
            <div class="btn-group">
              <button
                type="submit"
                [routerLink]="['/leaderboard', leaderboard.id, 'view']"
                class="btn btn-info btn-sm"
                data-cy="entityDetailsButton"
              >
                <fa-icon icon="eye"></fa-icon>
                <span class="d-none d-md-inline">View</span>
              </button>

              <button
                type="submit"
                [routerLink]="['/leaderboard', leaderboard.id, 'edit']"
                class="btn btn-primary btn-sm"
                data-cy="entityEditButton"
              >
                <fa-icon icon="pencil-alt"></fa-icon>
                <span class="d-none d-md-inline">Edit</span>
              </button>

              <button type="submit" (click)="delete(leaderboard)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                <fa-icon icon="times"></fa-icon>
                <span class="d-none d-md-inline">Delete</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
