<div>
  <h2 id="page-heading" data-cy="PurchaseListingHeading">
    <span>Purchase Listings</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="load()" [disabled]="isLoading">
        <fa-icon icon="sync" [spin]="isLoading"></fa-icon>
        <span>Refresh list</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-purchase-listing"
        [routerLink]="['/purchase-listing/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span> Create a new Purchase Listing </span>
      </button>
    </div>
  </h2>

  <jhi-alert-error></jhi-alert-error>

  <jhi-alert></jhi-alert>

  <div class="alert alert-warning" id="no-result" *ngIf="purchaseListings?.length === 0">
    <span>No Purchase Listings found</span>
  </div>

  <div class="table-responsive table-entities" id="entities" *ngIf="purchaseListings && purchaseListings.length > 0">
    <table class="table table-striped" aria-describedby="page-heading">
      <thead>
        <tr jhiSort [(predicate)]="predicate" [(ascending)]="ascending" (sortChange)="navigateToWithComponentValues()">
          <th scope="col" jhiSortBy="id">
            <div class="d-flex">
              <span>ID</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="itemForSale">
            <div class="d-flex">
              <span>Item For Sale</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="price">
            <div class="d-flex">
              <span>Price</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="seller.id">
            <div class="d-flex">
              <span>Seller</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let purchaseListing of purchaseListings; trackBy: trackId" data-cy="entityTable">
          <td>
            <a [routerLink]="['/purchase-listing', purchaseListing.id, 'view']">{{ purchaseListing.id }}</a>
          </td>
          <td>{{ purchaseListing.itemForSale }}</td>
          <td>{{ purchaseListing.price }}</td>
          <td>
            <div *ngIf="purchaseListing.seller">
              <a [routerLink]="['/user-profile', purchaseListing.seller.id, 'view']">{{ purchaseListing.seller.id }}</a>
            </div>
          </td>
          <td class="text-end">
            <div class="btn-group">
              <button
                type="submit"
                [routerLink]="['/purchase-listing', purchaseListing.id, 'view']"
                class="btn btn-info btn-sm"
                data-cy="entityDetailsButton"
              >
                <fa-icon icon="eye"></fa-icon>
                <span class="d-none d-md-inline">View</span>
              </button>

              <button
                type="submit"
                [routerLink]="['/purchase-listing', purchaseListing.id, 'edit']"
                class="btn btn-primary btn-sm"
                data-cy="entityEditButton"
              >
                <fa-icon icon="pencil-alt"></fa-icon>
                <span class="d-none d-md-inline">Edit</span>
              </button>

              <button type="submit" (click)="delete(purchaseListing)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                <fa-icon icon="times"></fa-icon>
                <span class="d-none d-md-inline">Delete</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
