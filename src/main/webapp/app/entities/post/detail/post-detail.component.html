<div class="d-flex justify-content-center">
  <div class="col-8">
    <div *ngIf="post">
      <h2 data-cy="postDetailsHeading"><span>Post</span></h2>

      <hr />

      <jhi-alert-error></jhi-alert-error>

      <jhi-alert></jhi-alert>

      <dl class="row-md jh-entity-details">
        <dt><span>ID</span></dt>
        <dd>
          <span>{{ post.id }}</span>
        </dd>
        <dt><span>Caption</span></dt>
        <dd>
          <span>{{ post.caption }}</span>
        </dd>
        <dt><span>Image</span></dt>
        <dd>
          <div *ngIf="post.image">
            <a (click)="openFile(post.image, post.imageContentType)">
              <img [src]="'data:' + post.imageContentType + ';base64,' + post.image" style="max-width: 100%" alt="post image" />
            </a>
            {{ post.imageContentType }}, {{ byteSize(post.image) }}
          </div>
        </dd>
        <dt><span>Created Date</span></dt>
        <dd>
          <span>{{ post.createdDate | formatMediumDate }}</span>
        </dd>
        <dt><span>Edited Date</span></dt>
        <dd>
          <span>{{ post.editedDate | formatMediumDate }}</span>
        </dd>
        <dt><span>Total Likes</span></dt>
        <dd>
          <span>{{ post.totalLikes }}</span>
        </dd>
        <dt><span>Author</span></dt>
        <dd>
          <div *ngIf="post.author">
            <a [routerLink]="['/user-profile', post.author.id, 'view']">{{ post.author.id }}</a>
          </div>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
      </button>

      <button type="button" [routerLink]="['/post', post.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
      </button>
    </div>
  </div>
</div>
