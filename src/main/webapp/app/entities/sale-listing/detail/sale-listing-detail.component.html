<div class="d-flex justify-content-center">
  <div class="col-8">
    <div *ngIf="saleListing">
      <h2 data-cy="saleListingDetailsHeading"><span>Sale Listing</span></h2>

      <hr />

      <jhi-alert-error></jhi-alert-error>

      <jhi-alert></jhi-alert>

      <dl class="row-md jh-entity-details">
        <dt><span>ID</span></dt>
        <dd>
          <span>{{ saleListing.id }}</span>
        </dd>
        <dt><span>Item For Sale</span></dt>
        <dd>
          <span>{{ saleListing.itemForSale }}</span>
        </dd>
        <dt><span>Price</span></dt>
        <dd>
          <span>{{ saleListing.price }}</span>
        </dd>
        <dt><span>Seller</span></dt>
        <dd>
          <div *ngIf="saleListing.seller">
            <a [routerLink]="['/user-profile', saleListing.seller.id, 'view']">{{ saleListing.seller.id }}</a>
          </div>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
      </button>

      <button type="button" [routerLink]="['/sale-listing', saleListing.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
      </button>
    </div>
  </div>
</div>
