<div class="d-flex justify-content-center">
  <div class="col-8">
    <div *ngIf="trendingOutfit">
      <h2 data-cy="trendingOutfitDetailsHeading"><span>Trending Outfit</span></h2>

      <hr />

      <jhi-alert-error></jhi-alert-error>

      <jhi-alert></jhi-alert>

      <dl class="row-md jh-entity-details">
        <dt><span>ID</span></dt>
        <dd>
          <span>{{ trendingOutfit.id }}</span>
        </dd>
        <dt><span>Name</span></dt>
        <dd>
          <span>{{ trendingOutfit.name }}</span>
        </dd>
        <dt><span>Description</span></dt>
        <dd>
          <span>{{ trendingOutfit.description }}</span>
        </dd>
        <dt><span>Rating</span></dt>
        <dd>
          <div *ngIf="trendingOutfit.rating">
            <a [routerLink]="['/rating', trendingOutfit.rating.id, 'view']">{{ trendingOutfit.rating.id }}</a>
          </div>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
      </button>

      <button type="button" [routerLink]="['/trending-outfit', trendingOutfit.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
      </button>
    </div>
  </div>
</div>
