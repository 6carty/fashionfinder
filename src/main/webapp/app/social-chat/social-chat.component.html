<div class="display-4">
  <p>Social Chat</p>
</div>

<div class="chat-container">
  <!-- Left Column for User Info and Chatrooms -->
  <div class="left-column">
    <div class="user-profile">
      <!-- User profile section -->
      <div *ngIf="account">
        <h3>Welcome {{ account.firstName }} {{ account.lastName }}!</h3>
      </div>
    </div>
    <div class="search-bar">
      <div class="center">
        <input type="text" placeholder="Search..." class="search-input" />
        <button class="search-btn">
          <fa-icon icon="magnifying-glass"></fa-icon>
        </button>
        <button class="add-btn">
          <fa-icon icon="plus"></fa-icon>
        </button>
      </div>
    </div>
    <div class="chatrooms-list">
      <h3>Chatrooms</h3>
    </div>
  </div>

  <!-- Right Column for Chat Interface -->
  <div class="right-column">
    <div class="chat-header">
      <!-- Chat header section -->
    </div>
    <div class="chat-messages">
      <!-- Messages will go here -->
      <div class="message" *ngFor="let message of messages">
        <div class="message-content" [ngClass]="{ sent: message.isSent, received: !message.isSent }">
          <span>{{ message.text }}</span>
          <span class="message-time">{{ message.time }}</span>
        </div>
      </div>
    </div>
    <div class="message-input">
      <div class="message-input-container">
        <input type="text" placeholder="Write" class="message-input-field" />
        <button class="send-btn">
          <img src="content/images/SendIcon.png" alt="Send" />
        </button>
      </div>
    </div>
  </div>
</div>
