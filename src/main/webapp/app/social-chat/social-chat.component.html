<div class="display-4">
  <p>Social Chat</p>
</div>

<div class="chat-container">
  <!-- Left Column for User Info and Chatrooms -->
  <div class="left-column">
    <!-- User profile section -->
    <div class="user-profile" *ngIf="account">
      <h3>Welcome {{ account.login }}!</h3>
    </div>

    <!-- Search and create chatroom -->
    <div class="search-bar">
      <div class="center">
        <span *ngIf="account">
          <input type="text" id="recipientField" placeholder="Enter recipient login" (keyup.enter)="onCreateChatroomButtonClick()" />
          <div class="create-new-chatroom-button" (click)="onCreateChatroomButtonClick()">
            <h5>Create new chatroom</h5>
          </div>
        </span>
        <button [routerLink]="['/login']" *ngIf="!account" class="button-focusable">Sign in to start chatting</button>
      </div>
    </div>

    <!-- Chatrooms list -->
    <div class="chatrooms-list">
      <h3>Chatrooms</h3>
      <ul class="chatroom-items">
        <li
          *ngFor="let chatroom of chatroomReceivedData"
          (click)="selectChatroom(chatroom)"
          (keyup.enter)="selectChatroom(chatroom)"
          tabindex="0"
        >
          <div class="chatroom-item">
            <!-- Chatroom item content -->
            <div class="chatroom-info">
              <div class="chatroom-name">
                <span>{{ chatroom.name }}</span>
              </div>
            </div>
          </div>
        </li>
      </ul>
    </div>
  </div>

  <!-- Right Column for Chat Interface -->
  <div class="right-column">
    <div class="chat-header">
      <div class="chat-partner-info">
        <div>
          <!-- Display selected chatroom's name -->
          <div class="chat-partner-name" *ngIf="selectedChatroom">{{ selectedChatroom.name }}</div>
          <!--          <div class="chat-partner-last-seen">Last Seen {{ currentChatPartner.lastSeen | date: 'shortTime' }}</div>-->
        </div>
      </div>
    </div>
    <div class="chat-messages" #messageContainer tabindex="0">
      <!-- Messages will go here -->
      <div class="message" *ngFor="let message of messages">
        <div class="message-content" [ngClass]="{ sent: message.isSent, received: !message.isSent }">
          <span>{{ message.text }}</span>
          <img
            *ngIf="message.image"
            [src]="message.image"
            class="message-image"
            alt="Image message"
            (click)="enlargeImage(message.image)"
          />
          <span class="message-time">{{ message.timestamp }}</span>
        </div>
      </div>
    </div>

    <div class="message-input">
      <div class="message-input-container">
        <input #fileInput type="file" (change)="handleImageInput($event)" />
        <input
          #messageInput
          type="text"
          [(ngModel)]="newMessageContent"
          placeholder="Write"
          class="message-input-field"
          (keyup.enter)="sendMessage()"
        />
        <button class="send-btn" (click)="sendMessage()">
          <img src="content/images/SendIcon.png" alt="Send" />
        </button>
      </div>
    </div>
  </div>
</div>
