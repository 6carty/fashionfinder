<div class="display-4">
  <p>Social Chat</p>
</div>

<div class="chat-container">
  <!-- Left Column for User Info and Chatrooms -->
  <div class="left-column">
    <div class="user-profile">
      <!-- User profile section -->
    </div>
    <div class="search-bar">
      <input type="text" placeholder="Search..." class="search-input" />
      <button class="search-btn">
        <fa-icon icon="magnifying-glass" [fixedWidth]="true"></fa-icon>
      </button>
      <button class="add-btn">
        <fa-icon icon="plus" [fixedWidth]="true"></fa-icon>
      </button>
    </div>
    <div class="chatrooms-list">
      <!-- Chatrooms list section -->
    </div>
  </div>

  <!-- Right Column for Chat Interface -->
  <div class="right-column">
    <div class="chat-header">
      <!-- Chat header section -->
    </div>
    <div class="chat-messages">
      <!-- Messages will go here -->
    </div>
    <div class="message-input">
      <div class="message-input-container">
        <input type="text" placeholder="Write" class="message-input-field" />
        <button class="send-button">
          <img src="content/images/SendIcon.png" alt="Send" />
        </button>
      </div>
    </div>
  </div>
</div>
