<div class="display-5">
  <div class="non-img-boxes">
    <div class="date-and-time">
      <h5 class="date-txt">{{ currentDateStr }}</h5>
      <h5>
        <span class="time-txt">{{ currentTimeStr }} </span>
        <span class="current-temp">{{ currentHourTemperature }} °C</span>
      </h5>
    </div>
    <div class="filter-box">
      <h4 class="filter-text">Filters</h4>
      <div class="topnav">
        <div class="search-container">
          <input type="text" placeholder="Filter by Search.." name="search" [(ngModel)]="searchTerm" (input)="fetchFilteredOutfit()" />
          <button type="submit"><fa-icon icon="magnifying-glass" [fixedWidth]="true"></fa-icon></button>
        </div>
      </div>
      <div class="normal-filters">
        <button class="occasion-Button" (click)="toggleOccasionDropdown()">
          <span class="Brandtxt">Occasion</span> <fa-icon class="plusbt" icon="plus"></fa-icon>
        </button>
        <hr class="line3" />
        <div class="dropdown-content" [ngStyle]="{ display: isOccasionDropdownOpen ? 'block' : 'none' }">
          <label> <input type="radio" id="FormalCheck" name="ocassion" /> Formal</label>
          <label><input type="radio" id="BusinessCheck" name="ocassion" /> Business</label>
          <label><input type="radio" id="CasualCheck" name="ocassion" /> Casual</label>
          <label><input type="radio" id="SportCheck" name="ocassion" />Sport</label>
        </div>
        <button class="weather-Button" (click)="toggleWeatherDropdown()">
          <span class="Brandtxt">Weather</span> <fa-icon class="plusbt" icon="plus"></fa-icon>
        </button>
        <hr class="line3" />
        <div class="dropdown-content" [ngStyle]="{ display: isWeatherDropdownOpen ? 'block' : 'none' }">
          <label> <input type="checkbox" id="WeatherSunny" name="Weather" /> Sunny</label>
          <label><input type="checkbox" id="WeatherRainy" name="Weather" /> Rainy</label>
          <label><input type="checkbox" id="WeatherWindy" name="Weather" /> Windy</label>
          <label><input type="checkbox" id="WeatherCold" name="Weather" />Cold</label>
          <label><input type="checkbox" id="WeatherHot" name="Weather" /> Hot</label>
          <label><input type="checkbox" id="WeatherSnowy" name="Weather" />Snowy</label>
        </div>
        <button class="date-Button" (click)="toggleDateDropdown()">
          <span class="Brandtxt">Date Added</span> <fa-icon class="plusbt" icon="plus"></fa-icon>
        </button>
        <hr class="line3" />
        <div class="dropdown-content" [ngStyle]="{ display: isDateDropdownOpen ? 'block' : 'none' }">
          <label> <input type="radio" id="DateToday" name="Dates" /> Today</label>
          <label><input type="radio" id="DateWeek" name="Dates" /> This Week</label>
          <label><input type="radio" id="DateMonth" name="Dates" /> This Month</label>
          <label><input type="radio" id="DateYear" name="Dates" />This year</label>
        </div>
      </div>

      <button class="clear-button" (click)="clearFilterSelections()">Clear All</button>
    </div>
  </div>
