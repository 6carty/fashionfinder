<div class="display-5">
  <div class="non-img-boxes">
    <div class="date-and-time">
      <h5 class="date-txt">{{ currentDateStr }}</h5>
      <h5>
        <span class="time-txt">{{ currentTimeStr }} </span>
        <span class="current-temp">{{ currentHourTemperature }} °C</span>
      </h5>
    </div>
    <div class="filter-box">
      <h4 class="filter-text">Filters</h4>
      <div class="topnav">
        <div class="search-container">
          <input type="text" placeholder="Filter by Search.." name="search" [(ngModel)]="searchTerm" (input)="fetchFilteredOutfit()" />
          <button type="submit"><fa-icon icon="magnifying-glass" [fixedWidth]="true"></fa-icon></button>
        </div>
      </div>
      <div class="normal-filters">
        <button class="occasion-Button" (click)="toggleOccasionDropdown()">
          <span class="Brandtxt">Occasion</span> <fa-icon class="plusbt" icon="plus"></fa-icon>
        </button>
        <hr class="line3" />
        <div class="dropdown-content" [ngStyle]="{ display: isOccasionDropdownOpen ? 'block' : 'none' }">
          <label> <input type="radio" id="FormalCheck" name="ocassion" /> Formal</label>
          <label><input type="radio" id="BusinessCheck" name="ocassion" /> Business</label>
          <label><input type="radio" id="CasualCheck" name="ocassion" /> Casual</label>
          <label><input type="radio" id="SportCheck" name="ocassion" />Sport</label>
        </div>
        <button class="weather-Button" (click)="toggleWeatherDropdown()">
          <span class="Brandtxt">Weather</span> <fa-icon class="plusbt" icon="plus"></fa-icon>
        </button>
        <hr class="line3" />
        <div class="dropdown-content" [ngStyle]="{ display: isWeatherDropdownOpen ? 'block' : 'none' }">
          <label> <input type="checkbox" id="WeatherSunny" name="Weather" /> Sunny</label>
          <label><input type="checkbox" id="WeatherRainy" name="Weather" /> Rainy</label>
          <label><input type="checkbox" id="WeatherWindy" name="Weather" /> Windy</label>
          <label><input type="checkbox" id="WeatherCold" name="Weather" />Cold</label>
          <label><input type="checkbox" id="WeatherHot" name="Weather" /> Hot</label>
          <label><input type="checkbox" id="WeatherSnowy" name="Weather" />Snowy</label>
        </div>
        <button class="date-Button" (click)="toggleDateDropdown()">
          <span class="Brandtxt">Date Added</span> <fa-icon class="plusbt" icon="plus"></fa-icon>
        </button>
        <hr class="line3" />
        <div class="dropdown-content" [ngStyle]="{ display: isDateDropdownOpen ? 'block' : 'none' }">
          <label> <input type="radio" id="DateToday" name="Dates" /> Today</label>
          <label><input type="radio" id="DateWeek" name="Dates" /> This Week</label>
          <label><input type="radio" id="DateMonth" name="Dates" /> This Month</label>
          <label><input type="radio" id="DateYear" name="Dates" />This year</label>
        </div>
      </div>

      <button class="clear-button" (click)="clearFilterSelections()">Clear All</button>
    </div>
  </div>

  <div class="rectangle-4" *ngIf="allfiltersOff && !seeallview">
    <h5 class="recommended-outfit-text">Recommended Outfits <button class="seeAllviewbt" (click)="changeToSeeAll()">see all</button></h5>
    <div class="first-image-line">
      <ng-container *ngFor="let image of outfitImages; let i = index">
        <img
          class="outfit-image"
          [src]="image"
          onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 512 512\'%3E%3Cpath d=\'M367.2 412.5L99.5 144.8C77.1 176.1 64 214.5 64 256c0 106 86 192 192 192c41.5 0 79.9-13.1 111.2-35.5zm45.3-45.3C434.9 335.9 448 297.5 448 256c0-106-86-192-192-192c-41.5 0-79.9 13.1-111.2 35.5L412.5 367.2zM0 256a256 256 0 1 1 512 0A256 256 0 1 1 0 256z\'/%3E%3C/svg%3E';"
          [routerLink]="['/outfit', outfit[i].id, 'view']"
        />
      </ng-container>
      <ng-container *ngIf="this.outfitImages.length == 0">
        <div class="first-line-img02" *ngFor="let placeholder of placeholders; let i = index"></div>
      </ng-container>
    </div>
    <h5 class="trending-outfit-text">Trending Outfits</h5>
    <div class="second-image-line">
      <ng-container *ngFor="let item of likeOccurence; let i = index">
        <div class="image-container">
          <!--          <div *ngIf="i < likeOccurence.length">-->
          <button class="outfitbt" (click)="likeOutfit(likeOccurence[i].outfit.id)">
            <fa-icon icon="heart" *ngIf="likedStates[i]"></fa-icon>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" *ngIf="!likedStates[i]">
              <path
                d="M225.8 468.2l-2.5-2.3L48.1 303.2C17.4 274.7 0 234.7 0 192.8v-3.3c0-70.4 50-130.8 119.2-144C158.6 37.9 198.9 47 231 69.6c9 6.4 17.4 13.8 25 22.3c4.2-4.8 8.7-9.2 13.5-13.3c3.7-3.2 7.5-6.2 11.5-9c0 0 0 0 0 0C313.1 47 353.4 37.9 392.8 45.4C462 58.6 512 119.1 512 189.5v3.3c0 41.9-17.4 81.9-48.1 110.4L288.7 465.9l-2.5 2.3c-8.2 7.6-19 11.9-30.2 11.9s-22-4.2-30.2-11.9zM239.1 145c-.4-.3-.7-.7-1-1.1l-17.8-20c0 0-.1-.1-.1-.1c0 0 0 0 0 0c-23.1-25.9-58-37.7-92-31.2C81.6 101.5 48 142.1 48 189.5v3.3c0 28.5 11.9 55.8 32.8 75.2L256 430.7 431.2 268c20.9-19.4 32.8-46.7 32.8-75.2v-3.3c0-47.3-33.6-88-80.1-96.9c-34-6.5-69 5.4-92 31.2c0 0 0 0-.1 .1s0 0-.1 .1l-17.8 20c-.3 .4-.7 .7-1 1.1c-4.5 4.5-10.6 7-16.9 7s-12.4-2.5-16.9-7z"
              />
            </svg>
          </button>
          <!--          </div>-->
          <img
            class="outfit-image-3"
            [src]="'data:' + item.outfit.imageContentType + ';base64,' + item.outfit.image"
            onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 512 512\'%3E%3Cpath d=\'M367.2 412.5L99.5 144.8C77.1 176.1 64 214.5 64 256c0 106 86 192 192 192c41.5 0 79.9-13.1 111.2-35.5zm45.3-45.3C434.9 335.9 448 297.5 448 256c0-106-86-192-192-192c-41.5 0-79.9 13.1-111.2 35.5L412.5 367.2zM0 256a256 256 0 1 1 512 0A256 256 0 1 1 0 256z\'/%3E%3C/svg%3E';"
            [routerLink]="['/outfit', item.outfit.id, 'view']"
          />
        </div>
      </ng-container>
      <ng-container *ngIf="likeOccurence.length < 5">
        <div class="outfit-image-3" *ngFor="let item of placeholders2; let i = index">
          <div class="image-container">
            <!--            <button class="outfitbt" (click)="likeOutfit(placeholders2[i].id)">-->
            <!--              <fa-icon icon="heart" *ngIf="likedStates[likeOccurence.length + i]"></fa-icon>-->
            <!--              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" *ngIf="!likedStates[i]">-->
            <!--                <path-->
            <!--                  d="M225.8 468.2l-2.5-2.3L48.1 303.2C17.4 274.7 0 234.7 0 192.8v-3.3c0-70.4 50-130.8 119.2-144C158.6 37.9 198.9 47 231 69.6c9 6.4 17.4 13.8 25 22.3c4.2-4.8 8.7-9.2 13.5-13.3c3.7-3.2 7.5-6.2 11.5-9c0 0 0 0 0 0C313.1 47 353.4 37.9 392.8 45.4C462 58.6 512 119.1 512 189.5v3.3c0 41.9-17.4 81.9-48.1 110.4L288.7 465.9l-2.5 2.3c-8.2 7.6-19 11.9-30.2 11.9s-22-4.2-30.2-11.9zM239.1 145c-.4-.3-.7-.7-1-1.1l-17.8-20c0 0-.1-.1-.1-.1c0 0 0 0 0 0c-23.1-25.9-58-37.7-92-31.2C81.6 101.5 48 142.1 48 189.5v3.3c0 28.5 11.9 55.8 32.8 75.2L256 430.7 431.2 268c20.9-19.4 32.8-46.7 32.8-75.2v-3.3c0-47.3-33.6-88-80.1-96.9c-34-6.5-69 5.4-92 31.2c0 0 0 0-.1 .1s0 0-.1 .1l-17.8 20c-.3 .4-.7 .7-1 1.1c-4.5 4.5-10.6 7-16.9 7s-12.4-2.5-16.9-7z"-->
            <!--                />-->
            <!--              </svg>-->
            <!--            </button>-->
            <button class="outfitbt" (click)="likeOutfit(placeholders2[i].id)">
              <fa-icon icon="heart" *ngIf="likedStates[likeOccurence.length + i]"></fa-icon>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" *ngIf="!likedStates[likeOccurence.length + i]">
                <path
                  d="M225.8 468.2l-2.5-2.3L48.1 303.2C17.4 274.7 0 234.7 0 192.8v-3.3c0-70.4 50-130.8 119.2-144C158.6 37.9 198.9 47 231 69.6c9 6.4 17.4 13.8 25 22.3c4.2-4.8 8.7-9.2 13.5-13.3c3.7-3.2 7.5-6.2 11.5-9c0 0 0 0 0 0C313.1 47 353.4 37.9 392.8 45.4C462 58.6 512 119.1 512 189.5v3.3c0 41.9-17.4 81.9-48.1 110.4L288.7 465.9l-2.5 2.3c-8.2 7.6-19 11.9-30.2 11.9s-22-4.2-30.2-11.9zM239.1 145c-.4-.3-.7-.7-1-1.1l-17.8-20c0 0-.1-.1-.1-.1c0 0 0 0 0 0c-23.1-25.9-58-37.7-92-31.2C81.6 101.5 48 142.1 48 189.5v3.3c0 28.5 11.9 55.8 32.8 75.2L256 430.7 431.2 268c20.9-19.4 32.8-46.7 32.8-75.2v-3.3c0-47.3-33.6-88-80.1-96.9c-34-6.5-69 5.4-92 31.2c0 0 0 0-.1 .1s0 0-.1 .1l-17.8 20c-.3 .4-.7 .7-1 1.1c-4.5 4.5-10.6 7-16.9 7s-12.4-2.5-16.9-7z"
                />
              </svg>
            </button>

            <img
              class="outfit-image-3"
              [src]="'data:' + item.imageContentType + ';base64,' + item.image"
              onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 512 512\'%3E%3Cpath d=\'M367.2 412.5L99.5 144.8C77.1 176.1 64 214.5 64 256c0 106 86 192 192 192c41.5 0 79.9-13.1 111.2-35.5zm45.3-45.3C434.9 335.9 448 297.5 448 256c0-106-86-192-192-192c-41.5 0-79.9 13.1-111.2 35.5L412.5 367.2zM0 256a256 256 0 1 1 512 0A256 256 0 1 1 0 256z\'/%3E%3C/svg%3E';"
              [routerLink]="['/outfit', item.id, 'view']"
            />
          </div>
        </div>
      </ng-container>
    </div>
  </div>
  <div *ngIf="allfiltersOff && this.seeallview">
    <h5>
      <button class="seeAllviewbt2" (click)="changeToSeeAll()">see less</button>
    </h5>

    <ng-container *ngFor="let outfitpic of alloutfitImage; let i = index">
      <img
        class="outfit-image-2"
        [src]="outfitpic"
        onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 512 512\'%3E%3Cpath d=\'M367.2 412.5L99.5 144.8C77.1 176.1 64 214.5 64 256c0 106 86 192 192 192c41.5 0 79.9-13.1 111.2-35.5zm45.3-45.3C434.9 335.9 448 297.5 448 256c0-106-86-192-192-192c-41.5 0-79.9 13.1-111.2 35.5L412.5 367.2zM0 256a256 256 0 1 1 512 0A256 256 0 1 1 0 256z\'/%3E%3C/svg%3E';"
        [routerLink]="['/outfit', alloutfitImage[i].id, 'view']"
      />
    </ng-container>
  </div>
  <div class="filter-results" *ngIf="!allfiltersOff">
    <ng-container *ngFor="let outfitPic of filterResults; let i = index">
      <img
        class="outfit-image-2"
        [src]="outfitPic"
        onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 512 512\'%3E%3Cpath d=\'M367.2 412.5L99.5 144.8C77.1 176.1 64 214.5 64 256c0 106 86 192 192 192c41.5 0 79.9-13.1 111.2-35.5zm45.3-45.3C434.9 335.9 448 297.5 448 256c0-106-86-192-192-192c-41.5 0-79.9 13.1-111.2 35.5L412.5 367.2zM0 256a256 256 0 1 1 512 0A256 256 0 1 1 0 256z\'/%3E%3C/svg%3E';"
        [routerLink]="['/outfit', filterOutfits[i].id, 'view']"
      />
    </ng-container>
  </div>
</div>
